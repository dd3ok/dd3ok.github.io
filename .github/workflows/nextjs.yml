name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Waitworthy wiki
        uses: actions/checkout@v4
        with:
          repository: dd3ok/waitworthy
          ref: main
          ssh-key: ${{ secrets.WAITWORTHY_DEPLOY_KEY }}
          path: .waitworthy

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Import Waitworthy notes
        env:
          WAITWORTHY_WIKI_DIR: .waitworthy/wiki
        run: npm run notes:import:waitworthy

      - name: Build with Next.js
        env:
          NEXT_PUBLIC_PAGES_KOYEB_API: ${{ secrets.PAGES_KOYEB_API }}
          NEXT_PUBLIC_WHO_AM_AI_API: ${{ secrets.WHO_AM_AI_API }}
          NEXT_PUBLIC_WHO_AM_AI_WS: ${{ secrets.WHO_AM_AI_WS }}
        run: npm run build

      - name: Verify static export output
        run: |
          test -f out/index.html
          test -f out/404.html
          test -d out/_next
          echo "Verified static export output:"
          ls -la out/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
